services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sop
      POSTGRES_PASSWORD: sop
      POSTGRES_DB: sop_opera
    ports:
      - "5433:5432"
    volumes:
      - sop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sop -d sop_opera"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sop_pgdata:
