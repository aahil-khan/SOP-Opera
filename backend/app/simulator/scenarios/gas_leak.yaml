name: gas_leak
label: Gas Leak
description: >
  Single-signal case. Gas reading climbs past threshold on Vessel A →
  Elevated Gas derived → Review opens → Assessment flags elevated risk.

steps:
  - asset: Vessel A
    category: sensor
    payload:
      gas_reading: 25.5
      unit: ppm
    confidence: 0.98
    delay_seconds: 0
    valid_for_hours: 4
