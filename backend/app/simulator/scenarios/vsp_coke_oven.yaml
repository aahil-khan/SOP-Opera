name: vsp_coke_oven
label: VSP Coke Oven (Hero)
description: >
  Visakhapatnam-pattern compound risk. Gas rises past the elevated (early-warning)
  line but stays below the single-sensor critical/incident threshold while hot work
  proceeds without verified isolation, and a worker later enters the hazardous zone.
  The compound engine blocks before any single sensor would trip critical —
  the signal that existed but was never fused.

  Two clocks: `t_offset_minutes` is plant process time (what lead time is measured
  in), `delay_seconds` is demo playback pacing. A ~34-minute excursion replays in
  ~26 seconds.

steps:
  # t=0 min — Gas elevated but sub-critical. Single-sensor critical baseline silent.
  - asset: Vessel A
    category: sensor
    payload:
      gas_reading: 25.0
      unit: ppm
    confidence: 0.98
    delay_seconds: 0
    t_offset_minutes: 0
    valid_for_hours: 4

  # t=6 min — Hot work permit with no confirmed isolation → incomplete_isolation.
  # Atmosphere + ignition source + failed barrier is already a complete
  # initiation pathway, so the compound engine BLOCKS here — before anyone is
  # exposed, and 28 minutes before a single sensor would alarm.
  - asset: Vessel A
    category: permit
    payload:
      permit_id: p-vsp-hot-1
      status: active
      work_type: hot_work
    confidence: 1.0
    delay_seconds: 4
    t_offset_minutes: 6
    valid_for_hours: 4

  # t=12 min — Worker enters the hazardous zone, adding personnel exposure to an
  # already-blocking state. This is the moment the VSP incident turned fatal.
  - asset: Vessel A
    category: worker_location
    payload:
      worker_id: "55555555-5555-5555-5555-555555555551"
      zone: hazardous
    confidence: 0.95
    delay_seconds: 4
    t_offset_minutes: 12
    valid_for_hours: 4

  # t=20 min — Gas still climbing, still sub-critical. Single-sensor still silent.
  - asset: Vessel A
    category: sensor
    payload:
      gas_reading: 42.0
      unit: ppm
    confidence: 0.98
    delay_seconds: 8
    t_offset_minutes: 20
    valid_for_hours: 4

  # t=34 min — Gas finally crosses the critical/incident threshold. This is when a
  # single-sensor baseline first alarms — the lead-time gap versus the block at t=6.
  - asset: Vessel A
    category: sensor
    payload:
      gas_reading: 55.0
      unit: ppm
    confidence: 0.99
    delay_seconds: 10
    t_offset_minutes: 34
    valid_for_hours: 4
