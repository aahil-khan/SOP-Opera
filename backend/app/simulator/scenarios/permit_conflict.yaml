name: permit_conflict
label: Permit Conflict
description: >
  Single-signal case. Two overlapping active permits on Compressor B →
  Permit Conflict derived → Review opens → Assessment flags a scheduling conflict.

steps:
  - asset: Compressor B
    category: permit
    payload:
      permit_id: p-hot-2
      status: active
      work_type: hot_work
    confidence: 1.0
    delay_seconds: 0
    valid_for_hours: 4

  - asset: Compressor B
    category: permit
    payload:
      permit_id: p-cold-1
      status: active
      work_type: cold_work
    confidence: 1.0
    delay_seconds: 2
    valid_for_hours: 4
