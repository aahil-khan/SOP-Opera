      <rect class="tank" x="170" y="780" width="250" height="80" fill="url(#oven-slots)" />
      <rect class="equipment" x="170" y="810" width="250" height="20" fill="#495057" opacity="0.8"/>
      
      <rect class="equipment" x="260" y="750" width="70" height="50" />
      <rect class="building-roof" x="270" y="760" width="50" height="30" />
      <circle cx="295" cy="775" r="10" fill="#343A40" />
      
