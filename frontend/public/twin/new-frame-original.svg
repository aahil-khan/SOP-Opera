      <rect class="equipment" x="530" y="490" width="110" height="210" fill="url(#solar-panel)" />
      
      <rect class="building-roof" x="660" y="510" width="60" height="60" />
      <rect class="building-roof" x="660" y="620" width="60" height="60" />

      <rect class="tank" x="660" y="525" width="170" height="30" rx="15" ry="15" />
      <rect class="tank" x="660" y="635" width="170" height="30" rx="15" ry="15" />
      
      <rect x="710" y="520" width="10" height="40" fill="#495057" />
      <rect x="780" y="520" width="10" height="40" fill="#495057" />
      <rect x="710" y="630" width="10" height="40" fill="#495057" />
      <rect x="780" y="630" width="10" height="40" fill="#495057" />
      
      <rect class="equipment" x="720" y="575" width="90" height="40" fill="#E9ECEF"/>
      
