      <rect class="label-bg" x="516" y="1002" width="190" height="14" />
      <text class="label-title" x="526" y="1013" font-size="7.2px">EFFLUENT TREATMENT PLANT (ETP)</text>
      <rect class="highlight-zone" x="510" y="780" width="340" height="250" />
    </g>

    <g id="asset-tank-farm" transform="translate(0, -60)">
