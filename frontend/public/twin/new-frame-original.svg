<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2600 2000" style="background-color: #EAECEF; width: 100%; min-width: 1600px; height: auto; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
    <filter id="light-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>

    <linearGradient id="tank-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8F9FA"/>
      <stop offset="50%" stop-color="#CED4DA"/>
      <stop offset="100%" stop-color="#6C757D"/>
    </linearGradient>
    <linearGradient id="pipe-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ADB5BD"/>
      <stop offset="50%" stop-color="#E9ECEF"/>
      <stop offset="100%" stop-color="#495057"/>
    </linearGradient>

    <pattern id="oven-slots" width="9" height="120" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4.5" height="120" fill="#6C757D" />
      <rect x="4.5" y="0" width="4.5" height="120" fill="#CED4DA" />
      <line x1="0" y1="60" x2="9" y2="60" stroke="#495057" stroke-width="0.75"/>
    </pattern>
    <pattern id="cooling-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="24" height="24" fill="#DEE2E6" stroke="#ADB5BD" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="7.5" fill="#495057" />
      <circle cx="12" cy="12" r="3" fill="#212529" />
    </pattern>
    <pattern id="stockpile-hatch" width="18" height="18" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="18" height="18" fill="#DEE2E6" />
      <line x1="0" y1="0" x2="0" y2="18" stroke="#ADB5BD" stroke-width="4.5" />
    </pattern>
    <pattern id="solar-panel" width="12" height="18" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="12" height="18" fill="#495057" stroke="#343A40" stroke-width="0.75" />
      <line x1="6" y1="0" x2="6" y2="18" stroke="#6C757D" stroke-width="0.75"/>
    </pattern>

    <style>
      .boundary { fill: none; stroke: #ADB5BD; stroke-width: 4.5; stroke-dasharray: 22,15; }
      .road-base { fill: none; stroke: #D3D7DB; stroke-width: 42; stroke-linecap: round; stroke-linejoin: round; }
      .road-line { fill: none; stroke: #F8F9FA; stroke-width: 3; stroke-dasharray: 12,12; stroke-linecap: round; }
      .conveyor { fill: none; stroke: #343A40; stroke-width: 7.5; }
      .conveyor-inner { fill: none; stroke: #ADB5BD; stroke-width: 2.25; stroke-dasharray: 6,3; }
      .building-base { fill: #F8F9FA; stroke: #ADB5BD; stroke-width: 2.25; filter: url(#drop-shadow); }
      .building-roof { fill: #E9ECEF; stroke: #CED4DA; stroke-width: 1.5; }
      .equipment { fill: #DEE2E6; stroke: #6C757D; stroke-width: 1.5; filter: url(#light-shadow); }
      .tank { fill: url(#tank-grad); stroke: #495057; stroke-width: 1.5; filter: url(#light-shadow); }
      .pipe { fill: none; stroke: url(#pipe-grad); stroke-width: 6; stroke-linejoin: round; }
      
      /* Typography */
      .label-title { font-size: 14.4px; font-weight: 700; fill: #212529; letter-spacing: 1px; }
      .label-bg { fill: rgba(255, 255, 255, 0.85); stroke: #DEE2E6; stroke-width: 1; rx: 4; ry: 4; }
      
      /* Interactive Overlay Layer */
      .highlight-zone { fill: transparent; stroke: transparent; cursor: pointer; transition: all 0.3s ease; }
      .highlight-zone:hover { stroke: #343A40; stroke-width: 3; fill: rgba(173, 181, 189, 0.15); }
    </style>
  </defs>

  <g id="master-scale-group" transform="scale(1.5)">
    
    <g id="plant-boundary" transform="translate(-40, -40) scale(1.08)">
      <path class="boundary" d="M 40,80 L 1450,40 L 1570,300 L 1520,1100 L 1200,1170 L 60,1160 Z" />
      <rect x="0" y="0" width="1800" height="1400" fill="url(#stockpile-hatch)" opacity="0.03" pointer-events="none"/>
    </g>

    <g id="road-network">
      <path class="road-base" d="M 70,70 L 1450,50 L 1550,280 L 1500,1080 L 1200,1180 L 90,1180 Z" />
      <path class="road-line" d="M 70,70 L 1450,50 L 1550,280 L 1500,1080 L 1200,1180 L 90,1180 Z" />
      
      <path class="road-base" d="M 450,75 L 450,1150 M 880,75 L 880,1120 M 70,450 L 880,450 M 450,830 L 1470,830" />
      <path class="road-line" d="M 450,75 L 450,1150 M 880,75 L 880,1120 M 70,450 L 880,450 M 450,830 L 1470,830" />
    </g>

    <g id="logistics-network">
      <path class="conveyor" d="M 1110,240 L 830,240 L 830,640 L 370,640 L 370,810" />
      <path class="conveyor-inner" d="M 1110,240 L 830,240 L 830,640 L 370,640 L 370,810" />
      
      <path class="conveyor" d="M 1110,390 L 850,390 L 850,960 L 370,960" />
      <path class="conveyor-inner" d="M 1110,390 L 850,390 L 850,960 L 370,960" />
      
      <path class="pipe" d="M 330,190 L 450,190 L 450,100 L 530,100" />
    </g>

    <g id="asset-byproduct-plant" transform="translate(-60, -60)">
      <rect class="building-base" x="140" y="140" width="310" height="280" />
      <rect class="building-roof" x="150" y="150" width="100" height="150" />
      <line x1="150" y1="225" x2="250" y2="225" stroke="#CED4DA" stroke-width="2"/>
      
      <circle class="tank" cx="290" cy="180" r="28" />
      <circle cx="290" cy="180" r="14" fill="none" stroke="#F8F9FA" stroke-width="1" opacity="0.5"/>
      <circle class="tank" cx="290" cy="250" r="28" />
      <circle cx="290" cy="250" r="14" fill="none" stroke="#F8F9FA" stroke-width="1" opacity="0.5"/>
      <circle class="tank" cx="290" cy="320" r="28" />
      
      <circle class="tank" cx="360" cy="180" r="18" />
      <circle class="tank" cx="360" cy="225" r="18" />
      <circle class="tank" cx="360" cy="270" r="18" />
      <circle class="tank" cx="360" cy="315" r="18" />
      
      <path class="pipe" d="M 290,180 L 290,320 M 290,250 L 360,250" />

      <rect class="equipment" x="150" y="320" width="110" height="80" fill="url(#cooling-grid)" />
      
      <rect class="label-bg" x="146" y="379" width="146" height="20" />
      <text class="label-title" x="156" y="393" font-size="9.6px">BY-PRODUCT PLANT</text>
      <rect class="highlight-zone" x="140" y="140" width="310" height="280" />
    </g>

    <g id="asset-coke-battery-b" transform="translate(-60, 0)">
