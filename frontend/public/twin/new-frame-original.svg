      <rect class="equipment" x="170" y="1010" width="50" height="50" fill="#CED4DA"/>
      <rect x="180" y="1020" width="30" height="30" fill="#343A40" /> 
      
      <rect class="equipment" x="370" y="1010" width="50" height="50" fill="#CED4DA"/>
      <rect x="380" y="1020" width="30" height="30" fill="#343A40" />
      
      <rect class="tank" x="240" y="1010" width="110" height="70" fill="#E9ECEF" />
      <line x1="295" y1="1010" x2="295" y2="1080" stroke="#ADB5BD" stroke-width="4" />
      <line x1="240" y1="1045" x2="350" y2="1045" stroke="#ADB5BD" stroke-width="4" />

      <rect class="label-bg" x="147" y="1066" width="90" height="14" />
      <text class="label-title" x="153" y="1077" font-size="7.2px">QUENCH AREA</text>
      <rect class="highlight-zone" x="140" y="1000" width="310" height="90" />
    </g>

    <g id="asset-dri-plant" transform="translate(0, 0)">
