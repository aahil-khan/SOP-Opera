        <circle cx="0" cy="0" r="28" fill="none" stroke="#F8F9FA" stroke-width="1.5" opacity="0.6"/>
        <circle cx="0" cy="0" r="18" fill="none" stroke="#F8F9FA" stroke-width="1" opacity="0.6"/>
