      <circle class="tank" cx="750" cy="260" r="15" />
      <circle class="tank" cx="750" cy="300" r="15" />

      <path class="pipe" d="M 570,240 L 570,260 M 670,240 L 670,260 M 570,250 L 750,250" stroke-width="2"/>

