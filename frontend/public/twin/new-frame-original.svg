      <line x1="170" y1="886" x2="420" y2="886" stroke="#343A40" stroke-width="1.5" />
      <line x1="170" y1="898" x2="420" y2="898" stroke="#343A40" stroke-width="1.5" />
      <rect x="220" y="882" width="30" height="21" fill="#F8F9FA" stroke="#495057"/>

      <rect class="equipment" x="170" y="920" width="250" height="20" />
      <line x1="170" y1="925" x2="420" y2="925" stroke="#343A40" stroke-width="1" />
