      <text class="label-title" x="531" y="724" font-size="9.6px">DRI PLANT</text>
      <rect class="highlight-zone" x="510" y="470" width="340" height="280" />
    </g>

    <g id="asset-etp" transform="translate(0, 60)">
      <rect class="building-base" x="510" y="780" width="340" height="250" />
      
      <circle class="tank" cx="590" cy="850" r="45" />
      <circle cx="590" cy="850" r="35" fill="none" stroke="#ADB5BD" stroke-width="2" />
      <line x1="545" y1="850" x2="635" y2="850" stroke="#495057" stroke-width="3" />
      <circle cx="590" cy="850" r="6" fill="#343A40" />

      <circle class="tank" cx="590" cy="950" r="45" />
      <circle cx="590" cy="950" r="35" fill="none" stroke="#ADB5BD" stroke-width="2" />
      <line x1="590" y1="905" x2="590" y2="995" stroke="#495057" stroke-width="3" />
      <circle cx="590" cy="950" r="6" fill="#343A40" />

