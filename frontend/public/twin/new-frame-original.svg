      <rect class="tank" x="170" y="510" width="250" height="80" fill="url(#oven-slots)" />
      <rect class="equipment" x="170" y="540" width="250" height="20" fill="#495057" opacity="0.8"/> 
      
      <rect class="equipment" x="260" y="480" width="70" height="50" />
      <rect class="building-roof" x="270" y="490" width="50" height="30" />
      <circle cx="295" cy="505" r="10" fill="#343A40" />
      
      <rect class="equipment" x="170" y="610" width="250" height="25" />
      <line x1="170" y1="616" x2="420" y2="616" stroke="#343A40" stroke-width="1.5" />
      <line x1="170" y1="628" x2="420" y2="628" stroke="#343A40" stroke-width="1.5" />
      <rect x="250" y="612" width="30" height="21" fill="#F8F9FA" stroke="#495057"/> 

      <rect class="equipment" x="170" y="650" width="250" height="20" />
      <line x1="170" y1="655" x2="420" y2="655" stroke="#343A40" stroke-width="1" />
      <line x1="170" y1="665" x2="420" y2="665" stroke="#343A40" stroke-width="1" />
      <rect x="300" y="652" width="40" height="16" fill="#F8F9FA" stroke="#495057"/> 

