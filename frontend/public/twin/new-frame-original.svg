      <text class="label-title" x="156" y="688" font-size="9.6px">COKE OVEN PLANT-2</text>
      <rect class="highlight-zone" x="140" y="470" width="310" height="240" />
    </g>

    <g id="asset-coke-battery-a" transform="translate(-60, 60)">
