# Full production stack: Postgres + API + Next.js web.
#
#   cp .env.prod.example .env.prod   # set host/IP URLs + secrets
#   ./scripts/deploy-prod.sh
#
# Dev DB-only compose remains: docker compose up -d db

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sop}
      POSTGRES_DB: ${POSTGRES_DB:-sop_opera}
    volumes:
      - sop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sop} -d ${POSTGRES_DB:-sop_opera}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sop}:${POSTGRES_PASSWORD:-sop}@db:5432/${POSTGRES_DB:-sop_opera}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sop_pgdata:
